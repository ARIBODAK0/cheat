name: Compile CPP to arm64-v8a.so

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - '.github/workflows/compile.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/**'
  workflow_dispatch:
    inputs:
      custom_name:
        description: 'Custom output name (without .so)'
        required: false
        default: 'lib_auto_retri'
        type: string
      optimization:
        description: 'Optimization level'
        required: false
        default: 'O2'
        type: choice
        options:
          - 'O0'
          - 'O1'
          - 'O2'
          - 'O3'
          - 'Os'

env:
  NDK_VERSION: r27c
  API_LEVEL: 21
  TARGET_ARCH: arm64-v8a
  OUTPUT_DIR: output

jobs:
  compile:
    name: Compile for ${{ env.TARGET_ARCH }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true
          link-to-sdk: true

      - name: Verify NDK installation
        run: |
          echo "NDK_HOME: $ANDROID_NDK_HOME"
          ls -la $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/
          
      - name: Create output directory
        run: mkdir -p ${{ env.OUTPUT_DIR }}

      - name: Set compiler and flags
        id: compiler
        run: |
          NDK_PATH="$ANDROID_NDK_HOME"
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
          COMPILER="$TOOLCHAIN/bin/aarch64-linux-android${{ env.API_LEVEL }}-clang++"
          
          echo "COMPILER=$COMPILER" >> $GITHUB_OUTPUT
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_OUTPUT
          
          # Verify compiler exists
          if [ ! -f "$COMPILER" ]; then
            echo "❌ Compiler not found: $COMPILER"
            exit 1
          fi
          
          echo "✅ Compiler found: $COMPILER"
          $COMPILER --version

      - name: Compile to .so file
        run: |
          COMPILER="${{ steps.compiler.outputs.COMPILER }}"
          INPUT_FILE="src/auto_retri.cpp"
          OUTPUT_NAME="${{ github.event.inputs.custom_name || 'lib_auto_retri' }}"
          OUTPUT_FILE="${{ env.OUTPUT_DIR }}/${OUTPUT_NAME}.so"
          OPT_LEVEL="${{ github.event.inputs.optimization || 'O2' }}"
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📁 Input file: $INPUT_FILE"
          echo "📁 Output file: $OUTPUT_FILE"
          echo "⚙️  Optimization: -$OPT_LEVEL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Check if source file exists
          if [ ! -f "$INPUT_FILE" ]; then
            echo "❌ Source file not found: $INPUT_FILE"
            exit 1
          fi
          
          # Compile
          $COMPILER \
            -std=c++17 \
            -$OPT_LEVEL \
            -fPIC \
            -shared \
            -o "$OUTPUT_FILE" \
            "$INPUT_FILE" \
            -llog \
            -ldl \
            -static-libstdc++ \
            -Wall \
            -Wextra \
            -Wno-unused-parameter \
            -fvisibility=hidden \
            -fvisibility-inlines-hidden
          
          # Check if compilation succeeded
          if [ $? -eq 0 ] && [ -f "$OUTPUT_FILE" ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ Compilation successful!"
            echo "📦 Output: $OUTPUT_FILE"
            ls -lh "$OUTPUT_FILE"
            file "$OUTPUT_FILE"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          else
            echo "❌ Compilation failed!"
            exit 1
          fi

      - name: Extract symbols (debug info)
        run: |
          OUTPUT_NAME="${{ github.event.inputs.custom_name || 'lib_auto_retri' }}"
          OUTPUT_FILE="${{ env.OUTPUT_DIR }}/${OUTPUT_NAME}.so"
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Extracting symbol information..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Use nm to list symbols
          TOOLCHAIN="${{ steps.compiler.outputs.TOOLCHAIN }}"
          NM="$TOOLCHAIN/bin/llvm-nm"
          
          if [ -f "$NM" ]; then
            $NM -C "$OUTPUT_FILE" > "${{ env.OUTPUT_DIR }}/symbols.txt"
            echo "✅ Symbols saved to: ${{ env.OUTPUT_DIR }}/symbols.txt"
            
            # Count exported symbols
            EXPORT_COUNT=$($NM -C -D "$OUTPUT_FILE" | grep -c " T ")
            echo "📊 Exported symbols: $EXPORT_COUNT"
          fi

      - name: Verify .so file integrity
        run: |
          OUTPUT_NAME="${{ github.event.inputs.custom_name || 'lib_auto_retri' }}"
          OUTPUT_FILE="${{ env.OUTPUT_DIR }}/${OUTPUT_NAME}.so"
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Verifying .so file integrity..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Check if it's a valid ELF file
          if file "$OUTPUT_FILE" | grep -q "ELF.*64-bit.*ARM"; then
            echo "✅ Valid ARM64 ELF file detected"
          else
            echo "❌ Invalid ELF file format"
            file "$OUTPUT_FILE"
            exit 1
          fi
          
          # Check file size
          SIZE=$(stat -c%s "$OUTPUT_FILE")
          if [ $SIZE -lt 10000 ]; then
            echo "⚠️  Warning: File size is very small ($SIZE bytes)"
          else
            echo "✅ File size: $SIZE bytes"
          fi

      - name: Create Magisk module structure
        run: |
          OUTPUT_NAME="${{ github.event.inputs.custom_name || 'lib_auto_retri' }}"
          OUTPUT_FILE="${{ env.OUTPUT_DIR }}/${OUTPUT_NAME}.so"
          
          mkdir -p magisk_module/zygisk
          cp "$OUTPUT_FILE" magisk_module/zygisk/arm64-v8a.so
          
          # Create module.prop
          cat > magisk_module/module.prop << 'EOF'
          id=mlbb_auto_retri
          name=MLBB Auto Retri
          version=v1.0
          versionCode=1
          author=GitHub Actions
          description=Auto last hit Lord & Turtle using Retribution
          zygisk=true
          EOF
          
          # Create customize.sh
          cat > magisk_module/customize.sh << 'EOF'
          #!/system/bin/sh
          ui_print "================================"
          ui_print "  MLBB Auto Retri Module"
          ui_print "  Built by GitHub Actions"
          ui_print "================================"
          ui_print "[✓] Installation complete!"
          ui_print "[✓] Enable Zygisk in Magisk"
          EOF
          
          chmod 755 magisk_module/customize.sh
          
          echo "✅ Magisk module structure created"

      - name: Package Magisk module
        run: |
          cd magisk_module
          ZIP_NAME="mlbb-auto-retri-$(date +'%Y%m%d-%H%M%S').zip"
          zip -r "../${{ env.OUTPUT_DIR }}/$ZIP_NAME" ./*
          cd ..
          echo "✅ Magisk module packaged: ${{ env.OUTPUT_DIR }}/$ZIP_NAME"
          ls -lh "${{ env.OUTPUT_DIR }}"/*.zip

      - name: Generate build info
        run: |
          cat > "${{ env.OUTPUT_DIR }}/build_info.txt" << EOF
          ========================================
          Build Information
          ========================================
          Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Commit SHA: ${{ github.sha }}
          Commit Message: ${{ github.event.head_commit.message }}
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Optimization: ${{ github.event.inputs.optimization || 'O2' }}
          NDK Version: ${{ env.NDK_VERSION }}
          API Level: ${{ env.API_LEVEL }}
          Target Arch: ${{ env.TARGET_ARCH }}
          Compiler: aarch64-linux-android${{ env.API_LEVEL }}-clang++
          ========================================
          EOF
          
          echo "✅ Build info saved"

      - name: Upload artifact - .so file
        uses: actions/upload-artifact@v4
        with:
          name: arm64-v8a-library
          path: ${{ env.OUTPUT_DIR }}/*.so
          retention-days: 90
          compression-level: 9

      - name: Upload artifact - Magisk module zip
        uses: actions/upload-artifact@v4
        with:
          name: magisk-module
          path: ${{ env.OUTPUT_DIR }}/*.zip
          retention-days: 90
          compression-level: 9

      - name: Upload artifact - Build info
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: ${{ env.OUTPUT_DIR }}/build_info.txt
          retention-days: 90

      - name: Upload artifact - Symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols
          path: ${{ env.OUTPUT_DIR }}/symbols.txt
          retention-days: 30

  test:
    name: Test compiled library
    needs: compile
    runs-on: ubuntu-latest
    
    steps:
      - name: Download .so artifact
        uses: actions/download-artifact@v4
        with:
          name: arm64-v8a-library
          path: ./test_lib

      - name: Verify ELF structure
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Testing compiled library..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          SO_FILE=$(find ./test_lib -name "*.so" | head -1)
          
          if [ -z "$SO_FILE" ]; then
            echo "❌ No .so file found!"
            exit 1
          fi
          
          echo "📁 Testing: $SO_FILE"
          
          # Install tools
          sudo apt-get update -qq
          sudo apt-get install -y binutils-aarch64-linux-gnu
          
          # Check ELF header
          aarch64-linux-gnu-readelf -h "$SO_FILE"
          
          # Check dynamic sections
          aarch64-linux-gnu-readelf -d "$SO_FILE" | head -20
          
          # Check for required symbols
          if aarch64-linux-gnu-nm -C -D "$SO_FILE" | grep -q "ContinueSkill"; then
            echo "✅ Required symbols found"
          else
            echo "⚠️  Warning: Some symbols may be missing"
          fi
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ All tests passed!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  release:
    name: Create Release
    needs: [compile, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release_assets

      - name: Get current date and time
        id: datetime
        run: |
          echo "DATETIME=$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "DATE=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ steps.datetime.outputs.DATETIME }}
          name: Auto Retri Build ${{ steps.datetime.outputs.DATETIME }}
          body: |
            ## 🔧 Auto Retri Module - Automated Build
            
            ### Build Information
            - **Build Date:** ${{ steps.datetime.outputs.DATE }}
            - **Commit:** ${{ github.sha }}
            - **Branch:** ${{ github.ref_name }}
            - **NDK Version:** ${{ env.NDK_VERSION }}
            - **Target:** ${{ env.TARGET_ARCH }}
            
            ### 📦 Included Files
            - `*.so` - Native library for arm64-v8a
            - `*.zip` - Magisk module for installation
            - `build_info.txt` - Detailed build information
            - `symbols.txt` - Debug symbols
            
            ### ⚙️ Installation
            1. Download `magisk-module.zip`
            2. Install via Magisk Manager
            3. Enable Zygisk
            4. Reboot device
            
            ### ⚠️ Disclaimer
            For educational purposes only. Use at your own risk.
            
            ### 📝 Changelog
            Auto-generated build from latest commit.
          files: |
            release_assets/**/*.so
            release_assets/**/*.zip
            release_assets/**/*.txt
          draft: false
          prerelease: true
