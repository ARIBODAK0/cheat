name: Compile CPP to arm64-v8a.so

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      custom_name:
        description: 'Custom output name'
        required: false
        default: 'lib_auto_retri'
        type: string
      optimization:
        description: 'Optimization level'
        required: false
        default: 'O2'
        type: choice
        options: ['O0', 'O1', 'O2', 'O3', 'Os']

env:
  NDK_VERSION: r27c
  API_LEVEL: 21

jobs:
  compile:
    name: Compile for arm64-v8a
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create include directory and zygisk.hpp
        run: |
          mkdir -p include
          cat > include/zygisk.hpp << 'EOF'
          #pragma once
          #include <jni.h>
          
          namespace zygisk {
              enum class Option : int {
                  DLCLOSE_MODULE_LIBRARY = 0,
              };
              
              class Api {
              public:
                  virtual void setOption(Option opt) = 0;
                  virtual void *getModule() = 0;
              };
              
              class ModuleBase {
              public:
                  virtual void onLoad(Api *api, JNIEnv *env) {}
                  virtual void preAppSpecialize(void *args) {}
                  virtual void postAppSpecialize(const void *args) {}
                  Api *api;
                  JNIEnv *env;
              };
          }
          
          #define REGISTER_ZYGISK_MODULE(className) \
              extern "C" __attribute__((visibility("default"))) \
              zygisk::ModuleBase *create_zygisk_module() { return new className(); }
          EOF
          
          echo "✅ zygisk.hpp created"

      - name: Create src directory and auto_retri.cpp
        run: |
          mkdir -p src
          
          # Cek apakah file sudah ada
          if [ ! -f "src/auto_retri.cpp" ]; then
            echo "⚠️  src/auto_retri.cpp not found, creating dummy source..."
            cat > src/auto_retri.cpp << 'EOF'
          #include <android/log.h>
          #include "zygisk.hpp"
          
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, "AutoRetri", __VA_ARGS__)
          
          class AutoRetriModule : public zygisk::ModuleBase {
          public:
              void onLoad(zygisk::Api *api, JNIEnv *env) override {
                  LOGI("Auto Retri Module v12.0 Loaded");
                  LOGI("Educational Purpose Only");
              }
              
              void preAppSpecialize(void *args) override {
                  LOGI("preAppSpecialize called");
              }
              
              void postAppSpecialize(const void *args) override {
                  LOGI("postAppSpecialize called");
              }
          };
          
          REGISTER_ZYGISK_MODULE(AutoRetriModule)
          EOF
            echo "✅ Dummy source created"
          else
            echo "✅ Source file exists"
            cat src/auto_retri.cpp | head -10
          fi

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true
          link-to-sdk: true

      - name: Verify NDK and source file
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Verifying build environment..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Check NDK
          if [ -z "$ANDROID_NDK_HOME" ]; then
            echo "❌ ANDROID_NDK_HOME is not set"
            exit 1
          fi
          echo "✅ NDK_HOME: $ANDROID_NDK_HOME"
          
          # Check compiler
          COMPILER_PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ env.API_LEVEL }}-clang++"
          if [ ! -f "$COMPILER_PATH" ]; then
            echo "❌ Compiler not found: $COMPILER_PATH"
            exit 1
          fi
          echo "✅ Compiler found: $COMPILER_PATH"
          
          # Check source file
          if [ ! -f "src/auto_retri.cpp" ]; then
            echo "❌ src/auto_retri.cpp not found!"
            ls -la src/ || echo "src directory is empty"
            exit 1
          fi
          echo "✅ Source file exists: src/auto_retri.cpp"
          echo "📄 Source size: $(wc -c < src/auto_retri.cpp) bytes"
          
          # Check include
          if [ ! -f "include/zygisk.hpp" ]; then
            echo "❌ include/zygisk.hpp not found!"
            exit 1
          fi
          echo "✅ Header file exists: include/zygisk.hpp"

      - name: Compile to .so file
        run: |
          NDK_PATH="$ANDROID_NDK_HOME"
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
          COMPILER="$TOOLCHAIN/bin/aarch64-linux-android${{ env.API_LEVEL }}-clang++"
          
          INPUT_FILE="src/auto_retri.cpp"
          OUTPUT_NAME="${{ github.event.inputs.custom_name }}"
          if [ -z "$OUTPUT_NAME" ]; then
            OUTPUT_NAME="lib_auto_retri"
          fi
          OPT_LEVEL="${{ github.event.inputs.optimization }}"
          if [ -z "$OPT_LEVEL" ]; then
            OPT_LEVEL="O2"
          fi
          
          OUTPUT_FILE="output/${OUTPUT_NAME}.so"
          
          # Create output directory
          mkdir -p output
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔨 Starting compilation..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📁 Compiler: $COMPILER"
          echo "📁 Input file: $INPUT_FILE"
          echo "📁 Output file: $OUTPUT_FILE"
          echo "⚙️  Optimization: -$OPT_LEVEL"
          echo "📁 Include path: -I./include"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Verify input file exists again
          if [ ! -f "$INPUT_FILE" ]; then
            echo "❌ ERROR: Input file $INPUT_FILE does NOT exist!"
            echo "Contents of src directory:"
            ls -la src/
            exit 1
          fi
          
          # Run compilation with explicit command
          set -e
          $COMPILER \
            -std=c++17 \
            -$OPT_LEVEL \
            -fPIC \
            -shared \
            -I./include \
            -o "$OUTPUT_FILE" \
            "$INPUT_FILE" \
            -llog \
            -ldl \
            -static-libstdc++ \
            -Wall \
            -Wextra \
            -Wno-unused-parameter
          
          COMPILE_STATUS=$?
          set +e
          
          if [ $COMPILE_STATUS -eq 0 ] && [ -f "$OUTPUT_FILE" ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ Compilation successful!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            ls -lh "$OUTPUT_FILE"
            file "$OUTPUT_FILE"
          else
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ Compilation failed with exit code: $COMPILE_STATUS"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

      - name: Verify output
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Verifying output..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          OUTPUT_NAME="${{ github.event.inputs.custom_name }}"
          if [ -z "$OUTPUT_NAME" ]; then
            OUTPUT_NAME="lib_auto_retri"
          fi
          OUTPUT_FILE="output/${OUTPUT_NAME}.so"
          
          if [ -f "$OUTPUT_FILE" ]; then
            echo "✅ Output file found"
            echo "📦 File: $OUTPUT_FILE"
            echo "📏 Size: $(du -h "$OUTPUT_FILE" | cut -f1)"
            echo "🔖 Type: $(file "$OUTPUT_FILE" | cut -d: -f2)"
          else
            echo "❌ Output file not found!"
            ls -la output/
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arm64-v8a-library
          path: output/*.so
          retention-days: 90
