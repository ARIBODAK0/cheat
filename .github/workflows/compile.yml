Name: Compile Auto Retri v12.0 (Android 16 Optimized)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      optimization:
        description: 'Optimization level'
        required: false
        default: 'O3'  # Diubah ke O3 untuk performa game maksimal
        type: choice
        options: ['O0', 'O1', 'O2', 'O3', 'Os']

env:
  NDK_VERSION: r27c  # NDK stabil yang mendukung API tingkat tinggi
  API_LEVEL: 36      # Diperbarui khusus untuk Android 16 (API 36)

jobs:
  compile:
    name: Compile Auto Retri Full v12.0
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip coreutils

      - name: Create complete zygisk.hpp header
        run: |
          mkdir -p include
          cat > include/zygisk.hpp << 'ZYGISK_HEADER'
          #pragma once
          #include <jni.h>
          #include <cstdint>
          
          namespace zygisk {
              enum class Option : int {
                  DLCLOSE_MODULE_LIBRARY = 0,
                  FORCE_DENYLIST_ENFORCEMENT = 1,
              };
              
              struct AppSpecializeArgs {
                  void* nice_name;
                  void* app_data_dir;
                  void* se_info;
                  void* se_info_len;
                  void* runtime_flags;
                  void* rlimits;
                  void* app_component_name;
              };
              
              struct ServerSpecializeArgs {
                  void* uid;
                  void* gid;
                  void* gids;
                  void* runtime_flags;
                  void* rlimits;
              };
              
              class Api {
              public:
                  virtual void setOption(Option opt) = 0;
                  virtual void *getModule() = 0;
                  virtual void *getNativeBridge() = 0;
                  virtual void *getSym(const char *name) = 0;
                  virtual void hookJniNativeMethods(const char *class_name, JNINativeMethod *methods, int num_methods) = 0;
                  virtual void *getModuleBase() = 0;
                  virtual void connectCompanion(int fd) = 0;
              };
              
              class ModuleBase {
              public:
                  virtual void onLoad(Api *api, JNIEnv *env) {}
                  virtual void preAppSpecialize(AppSpecializeArgs *args) {}
                  virtual void postAppSpecialize(const AppSpecializeArgs *args) {}
                  virtual void preServerSpecialize(ServerSpecializeArgs *args) {}
                  virtual void postServerSpecialize(const ServerSpecializeArgs *args) {}
                  
                  Api *api;
                  JNIEnv *env;
              };
          }
          
          #define REGISTER_ZYGISK_MODULE(className) \
              extern "C" __attribute__((visibility("default"))) \
              zygisk::ModuleBase *create_zygisk_module() { return new className(); }
          ZYGISK_HEADER
          
          echo "✅ Complete zygisk.hpp created untuk Android 16"

      - name: Verify source file exists
        run: |
          if [ ! -f "src/auto_retri.cpp" ]; then
            echo "❌ ERROR: src/auto_retri.cpp tidak ditemukan!"
            echo "Silahkan upload source code kamu ke folder src/auto_retri.cpp"
            exit 1
          fi
          echo "✅ Source file ditemukan: src/auto_retri.cpp"

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true
          link-to-sdk: true

      - name: Verify NDK compiler (ARM64-v8a)
        run: |
          NDK_PATH="$ANDROID_NDK_HOME"
          COMPILER="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ env.API_LEVEL }}-clang++"
          
          if [ -z "$NDK_PATH" ] || [ ! -f "$COMPILER" ]; then
            echo "❌ Compiler untuk API ${{ env.API_LEVEL }} tidak ditemukan!"
            exit 1
          fi
          echo "✅ Compiler Android 16 siap digunakan:"
          $COMPILER --version | head -3

      - name: Compile to .so file (64-bit Modern)
        run: |
          NDK_PATH="$ANDROID_NDK_HOME"
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
          COMPILER="$TOOLCHAIN/bin/aarch64-linux-android${{ env.API_LEVEL }}-clang++"
          
          OPT_LEVEL="${{ github.event.inputs.optimization }}"
          if [ -z "$OPT_LEVEL" ]; then
            OPT_LEVEL="O3" # Default ke O3 untuk Android 16 agar eksekusi hit lebih instan
          fi
          
          mkdir -p output
          
          # Kompilasi dengan standar C++20 demi efisiensi memory di OS baru
          $COMPILER \
            -std=c++20 \
            -$OPT_LEVEL \
            -fPIC \
            -shared \
            -I./include \
            -o output/lib_auto_retri.so \
            src/auto_retri.cpp \
            -llog \
            -ldl \
            -static-libstdc++ \
            -Wall \
            -Wextra \
            -Wno-unused-parameter \
            -Wno-missing-field-initializers \
            -fvisibility=hidden \
            -fvisibility-inlines-hidden
          
          if [ $? -eq 0 ] && [ -f "output/lib_auto_retri.so" ]; then
            echo "✅ Kompilasi Sukses untuk Android 16!"
            ls -lh output/lib_auto_retri.so
          else
            echo "❌ Kompilasi Gagal!"
            exit 1
          fi

      - name: Create Magisk Module Zip
        run: |
          mkdir -p magisk_module/zygisk
          cp output/lib_auto_retri.so magisk_module/zygisk/arm64-v8a.so
          
          cat > magisk_module/module.prop << 'EOF'
          id=mlbb_auto_retri
          name=MLBB Auto Retri (Android 16 Ready)
          version=v12.0
          versionCode=120
          author=Auto Build
          description=Auto last hit Lord & Turtle. Dioptimalkan untuk Android 16 (API 36) ARM64 Murni.
          zygisk=true
          EOF
          
          cat > magisk_module/customize.sh << 'EOF'
          #!/system/bin/sh
          ui_print "===================================="
          ui_print "    MLBB Auto Retri v12.0           "
          ui_print "    Optimized for Android 16        "
          ui_print "===================================="
          ui_print "[✓] Arsitektur: ARM64-v8a (64-bit)"
          ui_print "[✓] Berhasil dipasang!"
          ui_print "------------------------------------"
          ui_print "⚠️  PERINGATAN UNTUK ANDROID 16:"
          ui_print "Pastikan Zygisk aktif di Magisk/Kitsune."
          ui_print "JANGAN masukkan MLBB ke DenyList bawaan."
          ui_print "Disarankan gunakan HideMyApplist / Shamiko"
          ui_print "===================================="
          EOF
          
          chmod 755 magisk_module/customize.sh
          
          cd magisk_module
          ZIP_NAME="mlbb-auto-retri-v12.0-A16-$(date +'%Y%m%d-%H%M%S').zip"
          zip -r "../output/$ZIP_NAME" ./*
          cd ..
          echo "✅ Modul Magisk sukses dibuat: output/$ZIP_NAME"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Auto-Retri-v12.0-Android16
          path: |
            output/lib_auto_retri.so
            output/*.zip
          retention-days: 90

  success-notification:
    name: Send notification on success
    needs: compile
    runs-on: ubuntu-latest
    if: needs.compile.result == 'success'
    steps:
      - run: echo "✅ Auto Retri v12.0 sukses di-compile untuk Android 16!"
