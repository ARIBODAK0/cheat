name: Compile CPP to arm64-v8a.so

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - '.github/workflows/compile.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/**'
  workflow_dispatch:
    inputs:
      custom_name:
        description: 'Custom output name (without .so)'
        required: false
        default: 'lib_auto_retri'
        type: string
      optimization:
        description: 'Optimization level'
        required: false
        default: 'O2'
        type: choice
        options:
          - 'O0'
          - 'O1'
          - 'O2'
          - 'O3'
          - 'Os'

# Define global environment variables at root level
env:
  NDK_VERSION: r27c
  API_LEVEL: 21
  TARGET_ARCH: arm64-v8a

jobs:
  compile:
    name: Compile for arm64-v8a
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true
          link-to-sdk: true

      - name: Verify NDK installation
        run: |
          echo "NDK_HOME: $ANDROID_NDK_HOME"
          ls -la $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/ || echo "NDK not found"
          
      - name: Create output directory
        run: mkdir -p output

      - name: Set compiler
        id: compiler
        run: |
          NDK_PATH="$ANDROID_NDK_HOME"
          if [ -z "$NDK_PATH" ]; then
            echo "❌ NDK_PATH is empty!"
            exit 1
          fi
          
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
          COMPILER="$TOOLCHAIN/bin/aarch64-linux-android21-clang++"
          
          echo "compiler=$COMPILER" >> $GITHUB_OUTPUT
          echo "toolchain=$TOOLCHAIN" >> $GITHUB_OUTPUT
          
          # Verify compiler exists
          if [ ! -f "$COMPILER" ]; then
            echo "❌ Compiler not found: $COMPILER"
            echo "Available compilers:"
            ls -la "$TOOLCHAIN/bin/" | grep clang || echo "None found"
            exit 1
          fi
          
          echo "✅ Compiler found: $COMPILER"
          $COMPILER --version || echo "Failed to get version"

      - name: Compile to .so file
        run: |
          COMPILER="${{ steps.compiler.outputs.compiler }}"
          INPUT_FILE="src/auto_retri.cpp"
          OUTPUT_NAME="${{ github.event.inputs.custom_name }}"
          if [ -z "$OUTPUT_NAME" ]; then
            OUTPUT_NAME="lib_auto_retri"
          fi
          OPT_LEVEL="${{ github.event.inputs.optimization }}"
          if [ -z "$OPT_LEVEL" ]; then
            OPT_LEVEL="O2"
          fi
          OUTPUT_FILE="output/${OUTPUT_NAME}.so"
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📁 Input file: $INPUT_FILE"
          echo "📁 Output file: $OUTPUT_FILE"
          echo "⚙️  Optimization: -$OPT_LEVEL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Check if source file exists
          if [ ! -f "$INPUT_FILE" ]; then
            echo "❌ Source file not found: $INPUT_FILE"
            echo "Available files in src/:"
            ls -la src/ || echo "src directory not found"
            exit 1
          fi
          
          # Compile
          $COMPILER \
            -std=c++17 \
            -$OPT_LEVEL \
            -fPIC \
            -shared \
            -o "$OUTPUT_FILE" \
            "$INPUT_FILE" \
            -llog \
            -ldl \
            -static-libstdc++ \
            -Wall \
            -Wextra \
            -Wno-unused-parameter \
            -fvisibility=hidden \
            -fvisibility-inlines-hidden 2>&1
          
          # Check if compilation succeeded
          if [ $? -eq 0 ] && [ -f "$OUTPUT_FILE" ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ Compilation successful!"
            echo "📦 Output: $OUTPUT_FILE"
            ls -lh "$OUTPUT_FILE"
            file "$OUTPUT_FILE"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          else
            echo "❌ Compilation failed!"
            exit 1
          fi

      - name: Extract symbols (debug info)
        run: |
          OUTPUT_NAME="${{ github.event.inputs.custom_name }}"
          if [ -z "$OUTPUT_NAME" ]; then
            OUTPUT_NAME="lib_auto_retri"
          fi
          OUTPUT_FILE="output/${OUTPUT_NAME}.so"
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Extracting symbol information..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          TOOLCHAIN="${{ steps.compiler.outputs.toolchain }}"
          NM="$TOOLCHAIN/bin/llvm-nm"
          
          if [ -f "$NM" ]; then
            $NM -C "$OUTPUT_FILE" > "output/symbols.txt" 2>/dev/null || echo "Failed to extract symbols"
            echo "✅ Symbols saved to: output/symbols.txt"
          else
            echo "⚠️  nm tool not found, skipping symbols"
          fi

      - name: Verify .so file integrity
        run: |
          OUTPUT_NAME="${{ github.event.inputs.custom_name }}"
          if [ -z "$OUTPUT_NAME" ]; then
            OUTPUT_NAME="lib_auto_retri"
          fi
          OUTPUT_FILE="output/${OUTPUT_NAME}.so"
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Verifying .so file integrity..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Check if it's a valid ELF file
          if file "$OUTPUT_FILE" | grep -q "ELF.*64-bit.*ARM"; then
            echo "✅ Valid ARM64 ELF file detected"
          else
            echo "⚠️  Warning: File may not be valid ARM64"
            file "$OUTPUT_FILE"
          fi
          
          # Check file size
          if [ -f "$OUTPUT_FILE" ]; then
            SIZE=$(stat -c%s "$OUTPUT_FILE" 2>/dev/null || stat -f%z "$OUTPUT_FILE" 2>/dev/null || echo "0")
            if [ "$SIZE" -lt 10000 ]; then
              echo "⚠️  Warning: File size is very small ($SIZE bytes)"
            else
              echo "✅ File size: $SIZE bytes"
            fi
          fi

      - name: Create Magisk module structure
        run: |
          OUTPUT_NAME="${{ github.event.inputs.custom_name }}"
          if [ -z "$OUTPUT_NAME" ]; then
            OUTPUT_NAME="lib_auto_retri"
          fi
          OUTPUT_FILE="output/${OUTPUT_NAME}.so"
          
          mkdir -p magisk_module/zygisk
          cp "$OUTPUT_FILE" magisk_module/zygisk/arm64-v8a.so
          
          # Create module.prop
          cat > magisk_module/module.prop << 'EOF'
          id=mlbb_auto_retri
          name=MLBB Auto Retri
          version=v1.0
          versionCode=1
          author=GitHub Actions
          description=Auto last hit Lord & Turtle using Retribution
          zygisk=true
          EOF
          
          # Create customize.sh
          cat > magisk_module/customize.sh << 'EOF'
          #!/system/bin/sh
          ui_print "================================"
          ui_print "  MLBB Auto Retri Module"
          ui_print "  Built by GitHub Actions"
          ui_print "================================"
          ui_print "[✓] Installation complete!"
          ui_print "[✓] Enable Zygisk in Magisk"
          EOF
          
          chmod +x magisk_module/customize.sh
          
          echo "✅ Magisk module structure created"

      - name: Package Magisk module
        run: |
          cd magisk_module
          ZIP_NAME="mlbb-auto-retri-$(date +'%Y%m%d-%H%M%S').zip"
          zip -r "../output/$ZIP_NAME" ./*
          cd ..
          echo "✅ Magisk module packaged: output/$ZIP_NAME"
          ls -lh output/*.zip 2>/dev/null || echo "No zip files found"

      - name: Generate build info
        run: |
          cat > output/build_info.txt << EOF
          ========================================
          Build Information
          ========================================
          Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Commit SHA: ${{ github.sha }}
          Commit Message: ${{ github.event.head_commit.message }}
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Optimization: ${{ github.event.inputs.optimization || 'O2' }}
          NDK Version: ${{ env.NDK_VERSION }}
          API Level: ${{ env.API_LEVEL }}
          Target Arch: arm64-v8a
          Compiler: aarch64-linux-android21-clang++
          ========================================
          EOF
          
          echo "✅ Build info saved"

      - name: Upload artifact - .so file
        uses: actions/upload-artifact@v4
        with:
          name: arm64-v8a-library
          path: output/*.so
          retention-days: 90
          compression-level: 9

      - name: Upload artifact - Magisk module zip
        uses: actions/upload-artifact@v4
        with:
          name: magisk-module
          path: output/*.zip
          retention-days: 90
          compression-level: 9

      - name: Upload artifact - Build info
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: output/build_info.txt
          retention-days: 90

      - name: Upload artifact - Symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols
          path: output/symbols.txt
          retention-days: 30
          if-no-files-found: ignore

  test:
    name: Test compiled library
    needs: compile
    runs-on: ubuntu-latest
    
    steps:
      - name: Download .so artifact
        uses: actions/download-artifact@v4
        with:
          name: arm64-v8a-library
          path: ./test_lib

      - name: Verify ELF structure
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Testing compiled library..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          SO_FILE=$(find ./test_lib -name "*.so" 2>/dev/null | head -1)
          
          if [ -z "$SO_FILE" ]; then
            echo "⚠️  No .so file found for testing"
            exit 0
          fi
          
          echo "📁 Testing: $SO_FILE"
          
          # Install tools
          sudo apt-get update -qq
          sudo apt-get install -y binutils-aarch64-linux-gnu 2>/dev/null || echo "Tools already installed"
          
          # Check ELF header
          if command -v aarch64-linux-gnu-readelf &> /dev/null; then
            aarch64-linux-gnu-readelf -h "$SO_FILE" 2>/dev/null | head -10 || echo "Cannot read ELF"
          fi
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Test completed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
