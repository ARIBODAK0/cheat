name: Compile Auto Retri v12.0

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      optimization:
        description: 'Optimization level'
        required: false
        default: 'O2'
        type: choice
        options: ['O0', 'O1', 'O2', 'O3', 'Os']

env:
  NDK_VERSION: r27c
  API_LEVEL: 21

jobs:
  compile:
    name: Compile Auto Retri Full v12.0
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create complete zygisk.hpp header
        run: |
          mkdir -p include
          cat > include/zygisk.hpp << 'ZYGISK_HEADER'
          #pragma once
          #include <jni.h>
          #include <cstdint>
          
          namespace zygisk {
              enum class Option : int {
                  DLCLOSE_MODULE_LIBRARY = 0,
                  FORCE_DENYLIST_ENFORCEMENT = 1,
              };
              
              struct AppSpecializeArgs {
                  void* nice_name;
                  void* app_data_dir;
                  void* se_info;
                  void* se_info_len;
                  void* runtime_flags;
                  void* rlimits;
                  void* app_component_name;
              };
              
              struct ServerSpecializeArgs {
                  void* uid;
                  void* gid;
                  void* gids;
                  void* runtime_flags;
                  void* rlimits;
              };
              
              class Api {
              public:
                  virtual void setOption(Option opt) = 0;
                  virtual void *getModule() = 0;
                  virtual void *getNativeBridge() = 0;
                  virtual void *getSym(const char *name) = 0;
                  virtual void hookJniNativeMethods(const char *class_name, JNINativeMethod *methods, int num_methods) = 0;
                  virtual void *getModuleBase() = 0;
                  virtual void connectCompanion(int fd) = 0;
              };
              
              class ModuleBase {
              public:
                  virtual void onLoad(Api *api, JNIEnv *env) {}
                  virtual void preAppSpecialize(AppSpecializeArgs *args) {}
                  virtual void postAppSpecialize(const AppSpecializeArgs *args) {}
                  virtual void preServerSpecialize(ServerSpecializeArgs *args) {}
                  virtual void postServerSpecialize(const ServerSpecializeArgs *args) {}
                  
                  Api *api;
                  JNIEnv *env;
              };
          }
          
          #define REGISTER_ZYGISK_MODULE(className) \
              extern "C" __attribute__((visibility("default"))) \
              zygisk::ModuleBase *create_zygisk_module() { return new className(); }
          ZYGISK_HEADER
          
          echo "✅ Complete zygisk.hpp created"
          cat include/zygisk.hpp | head -20

      - name: Verify source file exists
        run: |
          if [ ! -f "src/auto_retri.cpp" ]; then
            echo "❌ ERROR: src/auto_retri.cpp not found!"
            echo "Please upload your Auto Retri v12.0 source code to src/auto_retri.cpp"
            exit 1
          fi
          echo "✅ Source file found: src/auto_retri.cpp"
          echo "📄 File size: $(wc -c < src/auto_retri.cpp) bytes"
          echo "📄 First 10 lines:"
          head -10 src/auto_retri.cpp

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true
          link-to-sdk: true

      - name: Verify NDK compiler
        run: |
          NDK_PATH="$ANDROID_NDK_HOME"
          COMPILER="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ env.API_LEVEL }}-clang++"
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Verifying build environment..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ -z "$NDK_PATH" ]; then
            echo "❌ ANDROID_NDK_HOME is not set"
            exit 1
          fi
          echo "✅ NDK_HOME: $NDK_PATH"
          
          if [ ! -f "$COMPILER" ]; then
            echo "❌ Compiler not found: $COMPILER"
            exit 1
          fi
          echo "✅ Compiler found: $COMPILER"
          
          # Test compiler version
          $COMPILER --version | head -3

      - name: Compile to .so file
        run: |
          NDK_PATH="$ANDROID_NDK_HOME"
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
          COMPILER="$TOOLCHAIN/bin/aarch64-linux-android${{ env.API_LEVEL }}-clang++"
          
          OPT_LEVEL="${{ github.event.inputs.optimization }}"
          if [ -z "$OPT_LEVEL" ]; then
            OPT_LEVEL="O2"
          fi
          
          mkdir -p output
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔨 Compiling Auto Retri v12.0..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📁 Compiler: $COMPILER"
          echo "📁 Source: src/auto_retri.cpp"
          echo "📁 Output: output/lib_auto_retri.so"
          echo "⚙️  Optimization: -$OPT_LEVEL"
          echo "📁 Include: -I./include"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Compile
          $COMPILER \
            -std=c++17 \
            -$OPT_LEVEL \
            -fPIC \
            -shared \
            -I./include \
            -o output/lib_auto_retri.so \
            src/auto_retri.cpp \
            -llog \
            -ldl \
            -static-libstdc++ \
            -Wall \
            -Wextra \
            -Wno-unused-parameter \
            -Wno-missing-field-initializers \
            -fvisibility=hidden \
            -fvisibility-inlines-hidden
          
          COMPILE_STATUS=$?
          
          if [ $COMPILE_STATUS -eq 0 ] && [ -f "output/lib_auto_retri.so" ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ Compilation successful!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            ls -lh output/lib_auto_retri.so
            file output/lib_auto_retri.so
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # Check symbols
            echo "🔍 Checking exported symbols:"
            $TOOLCHAIN/bin/llvm-nm -C -D output/lib_auto_retri.so 2>/dev/null | grep " T " | head -10 || echo "No symbols found"
          else
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ Compilation failed with exit code: $COMPILE_STATUS"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

      - name: Create Magisk module
        run: |
          mkdir -p magisk_module/zygisk
          cp output/lib_auto_retri.so magisk_module/zygisk/arm64-v8a.so
          
          cat > magisk_module/module.prop << 'EOF'
          id=mlbb_auto_retri
          name=MLBB Auto Retri
          version=v12.0
          versionCode=12
          author=Auto Build
          description=Auto last hit Lord & Turtle using Retribution. Full version with anti-ban features.
          zygisk=true
          EOF
          
          cat > magisk_module/customize.sh << 'EOF'
          #!/system/bin/sh
          ui_print "================================"
          ui_print "  MLBB Auto Retri v12.0"
          ui_print "  Lord & Turtle Auto Last Hit"
          ui_print "================================"
          ui_print "[✓] Module installed successfully"
          ui_print "[✓] Enable Zygisk in Magisk"
          ui_print "[✓] Do NOT add MLBB to DenyList"
          ui_print "================================"
          EOF
          
          chmod 755 magisk_module/customize.sh
          
          cd magisk_module
          ZIP_NAME="mlbb-auto-retri-v12.0-$(date +'%Y%m%d-%H%M%S').zip"
          zip -r "../output/$ZIP_NAME" ./*
          cd ..
          
          echo "✅ Magisk module created: output/$ZIP_NAME"
          ls -lh output/*.zip

      - name: Generate build info
        run: |
          cat > output/build_info.txt << EOF
          ========================================
          Auto Retri v12.0 - Build Information
          ========================================
          Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Commit SHA: ${{ github.sha }}
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Optimization: -${{ github.event.inputs.optimization || 'O2' }}
          NDK Version: ${{ env.NDK_VERSION }}
          API Level: ${{ env.API_LEVEL }}
          Target: arm64-v8a
          Features: Lord detection, Turtle detection, Distance check, Damage calculation
          ========================================
          EOF
          
          echo "✅ Build info saved"

      - name: Upload .so library
        uses: actions/upload-artifact@v4
        with:
          name: arm64-v8a-library
          path: output/lib_auto_retri.so
          retention-days: 90
          compression-level: 9

      - name: Upload Magisk module zip
        uses: actions/upload-artifact@v4
        with:
          name: magisk-module
          path: output/*.zip
          retention-days: 90
          compression-level: 9

      - name: Upload build info
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: output/build_info.txt
          retention-days: 90

  success-notification:
    name: Send notification on success
    needs: compile
    runs-on: ubuntu-latest
    if: always() && needs.compile.result == 'success'
    steps:
      - run: echo "✅ Auto Retri v12.0 compiled successfully!"
