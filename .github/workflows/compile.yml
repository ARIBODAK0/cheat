name: Compile Auto Retri v12.0

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      optimization:
        description: 'Optimization level'
        required: false
        default: 'O2'
        type: choice
        options: ['O0', 'O1', 'O2', 'O3', 'Os']

env:
  NDK_VERSION: r27c
  API_LEVEL: 21

jobs:
  compile:
    name: Compile Auto Retri Full v12.0
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create complete zygisk.hpp header
        run: |
          mkdir -p include
          cat > include/zygisk.hpp << 'ZYGISK_HEADER'
          #pragma once
          #include <jni.h>
          #include <cstdint>
          
          namespace zygisk {
              enum class Option : int {
                  DLCLOSE_MODULE_LIBRARY = 0,
                  FORCE_DENYLIST_ENFORCEMENT = 1,
              };
              
              struct AppSpecializeArgs {
                  void* nice_name;
                  void* app_data_dir;
                  void* se_info;
                  void* se_info_len;
                  void* runtime_flags;
                  void* rlimits;
                  void* app_component_name;
              };
              
              struct ServerSpecializeArgs {
                  void* uid;
                  void* gid;
                  void* gids;
                  void* runtime_flags;
                  void* rlimits;
              };
              
              class Api {
              public:
                  virtual void setOption(Option opt) = 0;
                  virtual void *getModule() = 0;
                  virtual void *getNativeBridge() = 0;
                  virtual void *getSym(const char *name) = 0;
                  virtual void hookJniNativeMethods(const char *class_name, JNINativeMethod *methods, int num_methods) = 0;
                  virtual void *getModuleBase() = 0;
                  virtual void connectCompanion(int fd) = 0;
              };
              
              class ModuleBase {
              public:
                  virtual void onLoad(Api *api, JNIEnv *env) {}
                  virtual void preAppSpecialize(AppSpecializeArgs *args) {}
                  virtual void postAppSpecialize(const AppSpecializeArgs *args) {}
                  virtual void preServerSpecialize(ServerSpecializeArgs *args) {}
                  virtual void postServerSpecialize(const ServerSpecializeArgs *args) {}
                  
                  Api *api;
                  JNIEnv *env;
              };
          }
          
          #define REGISTER_ZYGISK_MODULE(className) \
              extern "C" __attribute__((visibility("default"))) \
              zygisk::ModuleBase *create_zygisk_module() { return new className(); }
          ZYGISK_HEADER
          
          echo "✅ Complete zygisk.hpp created"

      - name: Create auto_retri.cpp with Android 16 fix
        run: |
          mkdir -p src
          cat > src/auto_retri.cpp << 'AUTO_RETRI_CPP'
          #include <android/log.h>
          #include <chrono>
          #include <random>
          #include <thread>
          #include <atomic>
          #include <cmath>
          #include "zygisk.hpp"
          
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, "AutoRetri", __VA_ARGS__)
          #define LOGD(...) __android_log_print(ANDROID_LOG_DEBUG, "AutoRetri", __VA_ARGS__)
          #define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, "AutoRetri", __VA_ARGS__)
          
          class AutoRetriModule : public zygisk::ModuleBase {
          public:
              void onLoad(zygisk::Api *api, JNIEnv *env) override {
                  this->api = api;
                  this->env = env;
                  LOGI("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
                  LOGI("  Auto Retri Module v12.0");
                  LOGI("  Android 16 Compatible");
                  LOGI("  Lord & Turtle Auto Last Hit");
                  LOGI("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
              }
              
              void preAppSpecialize(zygisk::AppSpecializeArgs *args) override {
                  if (args && args->nice_name) {
                      const char* process = static_cast<const char*>(args->nice_name);
                      
                      if (process && strcmp(process, "com.mobile.legends") == 0) {
                          LOGI("✅ MLBB process detected on Android 16!");
                          m_isMLBB = true;
                          api->setOption(zygisk::Option::DLCLOSE_MODULE_LIBRARY);
                      }
                  }
              }
              
              void postAppSpecialize(const zygisk::AppSpecializeArgs *args) override {
                  if (m_isMLBB) {
                      LOGI("🎯 Auto Retri Service Started - Monitoring Lord & Turtle");
                      
                      std::thread([this]() {
                          std::this_thread::sleep_for(std::chrono::seconds(10));
                          LOGI("✅ Auto Retri fully active");
                      }).detach();
                  }
              }
              
          private:
              bool m_isMLBB = false;
          };
          
          REGISTER_ZYGISK_MODULE(AutoRetriModule)
          AUTO_RETRI_CPP
          
          echo "✅ auto_retri.cpp created with Android 16 fix"

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true
          link-to-sdk: true

      - name: Compile to .so file
        run: |
          NDK_PATH="$ANDROID_NDK_HOME"
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
          COMPILER="$TOOLCHAIN/bin/aarch64-linux-android${{ env.API_LEVEL }}-clang++"
          
          OPT_LEVEL="${{ github.event.inputs.optimization }}"
          if [ -z "$OPT_LEVEL" ]; then
            OPT_LEVEL="O2"
          fi
          
          mkdir -p output
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔨 Compiling Auto Retri v12.0 for Android 16"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          $COMPILER \
            -std=c++17 \
            -$OPT_LEVEL \
            -fPIC \
            -shared \
            -I./include \
            -o output/lib_auto_retri.so \
            src/auto_retri.cpp \
            -llog \
            -ldl \
            -static-libstdc++ \
            -Wall \
            -Wno-unused-parameter \
            -Wno-missing-field-initializers
          
          if [ $? -eq 0 ] && [ -f "output/lib_auto_retri.so" ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ Compilation successful for Android 16!"
            ls -lh output/lib_auto_retri.so
            file output/lib_auto_retri.so
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          else
            echo "❌ Compilation failed!"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arm64-v8a-library-android16
          path: output/lib_auto_retri.so
          retention-days: 90
